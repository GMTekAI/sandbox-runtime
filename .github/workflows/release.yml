name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-launcher:
    name: Build srt-launcher (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: sudo apt-get update && sudo apt-get install -y gcc libseccomp-dev musl-tools
      - run: npm run build:launcher
      - uses: actions/upload-artifact@v4
        with:
          name: srt-launcher-${{ matrix.arch }}
          path: vendor/srt-launcher/${{ matrix.arch }}
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build-launcher
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tag points to a commit not on main. Refusing to publish unreviewed code."
            exit 1
          fi

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) doesn't match package.json ($PKG_VERSION)"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v4
        with:
          name: srt-launcher-x64
          path: vendor/srt-launcher/x64
      - uses: actions/download-artifact@v4
        with:
          name: srt-launcher-arm64
          path: vendor/srt-launcher/arm64
      - run: chmod +x vendor/srt-launcher/*/srt-launcher

      - run: npm install
      - run: npm run clean && npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
